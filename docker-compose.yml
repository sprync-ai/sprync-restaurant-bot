version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DEBUG=False
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/app:/app/app
      - ./frontend:/frontend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - sprync-network

networks:
  sprync-network:
    driver: bridge
