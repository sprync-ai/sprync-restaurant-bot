services:
  - type: web
    name: sprync-restaurant-bot
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PORT
        value: "8000"
      - key: DEBUG
        value: "false"
      - key: PYTHONUNBUFFERED
        value: "1"
    routes:
      - type: http
        source: /
        destination: /
    staticPublishPath: frontend
    buildDir: ./backend
